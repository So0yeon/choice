<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>CHOICE MARKET</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
:root{
  --bg:#06080f;
  --panel:rgba(20,26,40,.62);
  --panel-solid:#10141f;
  --stroke:rgba(255,255,255,.10);
  --stroke-strong:rgba(255,255,255,.18);
  --text:#eef2f8;
  --muted:#8b97ad;
  --faint:#5a6479;
  --accent:#34e7c8;      /* mint-cyan, Choice Market brand */
  --accent2:#1fb8d6;
  --warn:#ff4d6d;        /* magenta-red warning */
  --gold:#ffcf5c;
  --good:#6ee7a8;
  --glass-blur:18px;
  --radius:26px;
  --safe-top:14px;
}
html[data-theme="light"]{
  --bg:#e8edf5;
  --panel:rgba(255,255,255,.66);
  --panel-solid:#ffffff;
  --stroke:rgba(10,18,40,.10);
  --stroke-strong:rgba(10,18,40,.16);
  --text:#0d1424;
  --muted:#5a6172;
  --faint:#9aa2b3;
  --accent:#0fae93;
  --accent2:#0d8fb0;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;height:100%;}
body{
  font-family:"Pretendard Variable",Pretendard,-apple-system,system-ui,sans-serif;
  background:#000;color:var(--text);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;-webkit-font-smoothing:antialiased;
  user-select:none;
}
.mono{font-family:"JetBrains Mono",ui-monospace,monospace;}

/* ============ PHONE FRAME ============ */
#device{
  position:relative;width:430px;height:920px;max-height:100vh;
  border-radius:54px;overflow:hidden;
  background:var(--bg);
  box-shadow:0 0 0 11px #14171d,0 0 0 13px #2a2f3a,0 40px 120px rgba(0,0,0,.7);
  transition:background .5s;
}
@media (max-width:480px){
  body{background:var(--bg);}
  #device{width:100vw;height:100vh;max-height:100vh;border-radius:0;box-shadow:none;}
}
/* animated atmosphere */
#device::before{
  content:"";position:absolute;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(120% 80% at 80% -10%, rgba(52,231,200,.16), transparent 55%),
    radial-gradient(120% 80% at -10% 110%, rgba(31,184,214,.14), transparent 55%),
    radial-gradient(90% 60% at 50% 50%, rgba(255,77,109,.05), transparent 70%);
  animation:drift 18s ease-in-out infinite alternate;
}
@keyframes drift{from{transform:translate(0,0) scale(1)}to{transform:translate(-12px,10px) scale(1.06)}}
#grain{position:absolute;inset:0;z-index:1;pointer-events:none;opacity:.05;mix-blend-mode:overlay;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");}

/* notch */
#notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:148px;height:30px;
  background:#000;border-radius:0 0 20px 20px;z-index:60;pointer-events:none;}
@media (max-width:480px){#notch{display:none}}

/* status bar */
#statusbar{position:absolute;top:0;left:0;right:0;height:46px;z-index:55;
  display:flex;align-items:center;justify-content:space-between;padding:14px 26px 0;
  font-size:14px;font-weight:600;pointer-events:none;}
#statusbar .clock{letter-spacing:.4px}
#statusbar .right{display:flex;gap:7px;align-items:center;font-size:12px}
#statusbar .batt{width:24px;height:12px;border:1.4px solid currentColor;border-radius:3px;position:relative;opacity:.9}
#statusbar .batt::after{content:"";position:absolute;right:-3px;top:3px;width:2px;height:6px;background:currentColor;border-radius:1px}
#statusbar .batt i{position:absolute;inset:1.5px;width:70%;background:currentColor;border-radius:1px;display:block}

/* screen stack */
#screens{position:absolute;inset:0;z-index:10;}
.screen{position:absolute;inset:0;display:none;flex-direction:column;
  padding-top:46px;animation:fadeIn .4s ease;}
.screen.active{display:flex;}
@keyframes fadeIn{from{opacity:0;transform:scale(1.015)}to{opacity:1;transform:scale(1)}}
.screen.slideIn{animation:slideIn .32s cubic-bezier(.2,.8,.2,1)}
@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}

/* ============ LOCK SCREEN ============ */
#lock{align-items:center;justify-content:flex-start;text-align:center;cursor:pointer;}
#lockTime{font-size:82px;font-weight:300;margin-top:96px;letter-spacing:-2px;line-height:1}
#lockDate{color:var(--muted);font-size:16px;margin-top:4px;font-weight:500}
#lockNotifs{width:88%;margin-top:34px;display:flex;flex-direction:column;gap:10px;overflow-y:auto;max-height:48%}
.locknotif{background:var(--panel);backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur));
  border:1px solid var(--stroke);border-radius:20px;padding:13px 16px;text-align:left;
  display:flex;gap:12px;align-items:flex-start;animation:popIn .45s cubic-bezier(.2,1.3,.4,1) both;}
.locknotif .ic{width:34px;height:34px;border-radius:9px;flex:none;display:flex;align-items:center;justify-content:center;font-size:18px}
.locknotif .t{font-size:12.5px;font-weight:700;display:flex;justify-content:space-between}
.locknotif .t small{color:var(--faint);font-weight:500}
.locknotif .b{font-size:13px;color:var(--muted);margin-top:2px;line-height:1.35}
#unlockHint{position:absolute;bottom:42px;left:0;right:0;color:var(--muted);font-size:14px;font-weight:500;
  animation:pulse 2.4s ease-in-out infinite}
#unlockBar{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);width:130px;height:5px;border-radius:3px;background:rgba(255,255,255,.55)}
@keyframes pulse{0%,100%{opacity:.45}50%{opacity:1}}
@keyframes popIn{from{opacity:0;transform:translateY(-12px) scale(.96)}to{opacity:1;transform:none}}

/* ============ HOME ============ */
#home{padding-top:64px;}
#homeWidget{margin:6px 22px 18px;background:var(--panel);backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur));
  border:1px solid var(--stroke);border-radius:24px;padding:16px 18px;}
#homeWidget .lbl{font-size:11px;letter-spacing:2px;color:var(--accent);font-weight:700}
#homeWidget .pts{font-size:30px;font-weight:800;margin-top:2px}
#homeWidget .sub{font-size:12.5px;color:var(--muted);margin-top:3px}
.appgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px 6px;padding:6px 20px;flex:1;align-content:start;overflow-y:auto}
.app{display:flex;flex-direction:column;align-items:center;gap:7px;cursor:pointer;animation:popIn .5s both}
.app .icon{width:62px;height:62px;border-radius:17px;display:flex;align-items:center;justify-content:center;font-size:28px;
  box-shadow:0 8px 20px rgba(0,0,0,.35);position:relative;transition:transform .15s}
.app:active .icon{transform:scale(.88)}
.app .name{font-size:12px;font-weight:500;color:var(--text);text-align:center}
.badge{position:absolute;top:-5px;right:-5px;min-width:20px;height:20px;padding:0 5px;border-radius:11px;background:var(--warn);
  color:#fff;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;border:2px solid var(--bg)}
#dock{margin:8px 16px 26px;background:var(--panel);backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur));
  border:1px solid var(--stroke);border-radius:30px;padding:12px 14px;display:flex;justify-content:space-around}
#dock .app .name{display:none}

/* ============ APP CHROME ============ */
.appbar{display:flex;align-items:center;gap:12px;padding:10px 18px 12px;flex:none;
  border-bottom:1px solid var(--stroke);background:var(--panel);backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur));}
.appbar .back{font-size:24px;color:var(--accent);cursor:pointer;line-height:1;width:24px}
.appbar .title{font-size:18px;font-weight:800}
.appbar .title small{display:block;font-size:11px;color:var(--muted);font-weight:500;letter-spacing:1px}
.appbar .sp{flex:1}
.appbar .acticon{font-size:20px;color:var(--muted);cursor:pointer}
.appbody{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.appbody::-webkit-scrollbar{width:0}

/* ============ CHOICE MARKET APP ============ */
#cmHead{padding:20px 20px 10px;text-align:center}
#cmHead .logo{font-weight:800;font-size:22px;letter-spacing:1px;
  background:linear-gradient(100deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;color:transparent}
#cmHead .tag{color:var(--muted);font-size:12px;margin-top:2px}
#cmWallet{margin:6px 18px 14px;border-radius:20px;padding:16px 18px;
  background:linear-gradient(120deg,rgba(52,231,200,.16),rgba(31,184,214,.10));border:1px solid var(--stroke-strong)}
#cmWallet .l{font-size:11px;letter-spacing:1.5px;color:var(--accent);font-weight:700}
#cmWallet .v{font-size:34px;font-weight:800;display:flex;align-items:baseline;gap:5px}
#cmWallet .v span{font-size:15px;color:var(--muted);font-weight:600}
.sectlabel{font-size:11px;letter-spacing:2px;color:var(--faint);font-weight:700;margin:4px 22px 8px}
.offer{margin:0 18px 14px;background:var(--panel);backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur));
  border:1px solid var(--stroke);border-radius:22px;padding:16px 18px;animation:popIn .45s both}
.offer.hot{border-color:rgba(255,77,109,.45);box-shadow:0 0 26px rgba(255,77,109,.12)}
.offer .tag{display:inline-block;font-size:10px;letter-spacing:1px;font-weight:800;padding:3px 8px;border-radius:8px;
  background:rgba(52,231,200,.16);color:var(--accent);margin-bottom:8px}
.offer.hot .tag{background:rgba(255,77,109,.18);color:var(--warn)}
.offer h3{margin:0;font-size:17px;font-weight:800}
.offer p{margin:6px 0 0;font-size:13px;color:var(--muted);line-height:1.5}
.offer .price{margin-top:12px;font-size:22px;font-weight:800;color:var(--accent)}
.offer .price small{font-size:13px;color:var(--muted);font-weight:600}
.offer .btns{display:flex;gap:10px;margin-top:14px}
.btn{flex:1;border:none;border-radius:14px;padding:13px;font-size:14px;font-weight:800;cursor:pointer;
  font-family:inherit;transition:transform .12s,filter .2s}
.btn:active{transform:scale(.96)}
.btn.sell{background:linear-gradient(100deg,var(--accent),var(--accent2));color:#04241f}
.btn.reject{background:rgba(255,255,255,.07);color:var(--text);border:1px solid var(--stroke)}
.btn.danger{background:linear-gradient(100deg,#ff4d6d,#ff7b54);color:#fff}
.empty{text-align:center;color:var(--faint);font-size:13px;padding:40px 20px;line-height:1.6}

/* ============ CHAT ============ */
.chatlist .row{display:flex;gap:13px;align-items:center;padding:13px 18px;cursor:pointer;border-bottom:1px solid var(--stroke)}
.chatlist .row:active{background:rgba(255,255,255,.04)}
.av{width:48px;height:48px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:#04120f}
.chatlist .row .meta{flex:1;min-width:0}
.chatlist .row .nm{font-weight:700;font-size:15px;display:flex;justify-content:space-between}
.chatlist .row .nm small{color:var(--faint);font-weight:500;font-size:11px}
.chatlist .row .pv{color:var(--muted);font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
#chatThread{flex:1;overflow-y:auto;padding:16px 14px 20px;display:flex;flex-direction:column;gap:9px;background:
  radial-gradient(100% 60% at 50% 0%,rgba(52,231,200,.05),transparent 60%)}
.bubble{max-width:78%;padding:11px 14px;border-radius:18px;font-size:14px;line-height:1.45;animation:popIn .35s both;word-break:break-word}
.bubble.them{background:var(--panel-solid);border:1px solid var(--stroke);border-bottom-left-radius:6px;align-self:flex-start}
.bubble.me{background:linear-gradient(100deg,var(--accent),var(--accent2));color:#04241f;border-bottom-right-radius:6px;align-self:flex-end;font-weight:600}
.bubble.sys{align-self:center;background:rgba(255,77,109,.12);color:var(--warn);font-size:12px;border-radius:12px;font-weight:600;text-align:center}
.typing{align-self:flex-start;background:var(--panel-solid);border:1px solid var(--stroke);border-radius:18px;padding:13px 16px;display:flex;gap:4px}
.typing i{width:7px;height:7px;border-radius:50%;background:var(--muted);animation:bounce 1.2s infinite}
.typing i:nth-child(2){animation-delay:.18s}.typing i:nth-child(3){animation-delay:.36s}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-6px);opacity:1}}
#chatReplies{flex:none;padding:12px 14px 22px;display:flex;flex-direction:column;gap:8px;border-top:1px solid var(--stroke)}
.reply{background:rgba(52,231,200,.10);border:1px solid rgba(52,231,200,.3);color:var(--text);border-radius:14px;
  padding:12px 14px;font-size:13.5px;text-align:left;cursor:pointer;font-family:inherit;transition:transform .12s}
.reply:active{transform:scale(.98)}

/* ============ SNS ============ */
.post{border-bottom:1px solid var(--stroke);padding:15px 18px;animation:popIn .4s both}
.post .h{display:flex;gap:11px;align-items:center}
.post .h .nm{font-weight:700;font-size:14px}
.post .h .hd{color:var(--faint);font-size:12px}
.post .av{width:42px;height:42px;font-size:18px}
.post .body{font-size:14.5px;line-height:1.5;margin:11px 2px 0;white-space:pre-wrap}
.post .acts{display:flex;gap:22px;margin-top:12px;color:var(--muted);font-size:13px}
.post .acts span{display:flex;gap:5px;align-items:center;cursor:pointer}
.post .acts .liked{color:var(--warn)}
.post .cmts{margin-top:11px;display:flex;flex-direction:column;gap:7px}
.cmt{font-size:13px;background:rgba(255,255,255,.04);border-radius:12px;padding:8px 11px}
.cmt b{font-weight:700}.cmt span{color:var(--muted)}

/* ============ NEWS ============ */
.news{border-bottom:1px solid var(--stroke);padding:16px 18px;cursor:pointer;animation:popIn .4s both}
.news .k{font-size:10px;letter-spacing:1.5px;font-weight:800;color:var(--accent2)}
.news.bad .k{color:var(--warn)}
.news h3{margin:6px 0 0;font-size:16px;font-weight:800;line-height:1.35}
.news p{margin:7px 0 0;font-size:13px;color:var(--muted);line-height:1.5}
.news .src{margin-top:9px;font-size:11px;color:var(--faint)}

/* ============ SETTINGS / PROFILE ============ */
.setgrp{margin:14px 16px;background:var(--panel);backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur));
  border:1px solid var(--stroke);border-radius:18px;overflow:hidden}
.setrow{display:flex;align-items:center;gap:13px;padding:15px 17px;border-bottom:1px solid var(--stroke);font-size:14.5px;cursor:pointer}
.setrow:last-child{border-bottom:none}
.setrow .ic{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex:none}
.setrow .sp{flex:1}
.setrow .val{color:var(--muted);font-size:13px}
.toggle{width:48px;height:28px;border-radius:16px;background:rgba(255,255,255,.15);position:relative;transition:background .25s;flex:none}
.toggle.on{background:var(--accent)}
.toggle i{position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:#fff;transition:transform .25s;box-shadow:0 2px 4px rgba(0,0,0,.3)}
.toggle.on i{transform:translateX(20px)}
#prof .card{margin:16px;text-align:center;padding:26px 20px;background:var(--panel);border:1px solid var(--stroke);border-radius:22px}
#prof .pav{width:84px;height:84px;border-radius:50%;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-size:38px;
  background:linear-gradient(120deg,var(--accent),var(--accent2));color:#04241f;font-weight:800}
#prof h2{margin:0;font-size:21px}
#prof .pid{color:var(--muted);font-size:12px;margin-top:2px}
.statbar{margin:14px 18px}
.statbar .l{display:flex;justify-content:space-between;font-size:12.5px;color:var(--muted);margin-bottom:6px}
.statbar .track{height:9px;border-radius:6px;background:rgba(255,255,255,.08);overflow:hidden}
.statbar .fill{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--accent2),var(--accent));transition:width 1s cubic-bezier(.2,.8,.2,1)}
.aiquote{margin:14px 18px;padding:15px 17px;border-radius:16px;border-left:3px solid var(--warn);background:rgba(255,77,109,.07);
  font-size:13.5px;line-height:1.55;color:var(--text)}
.aiquote b{color:var(--warn)}

/* ============ APP STORE ============ */
#store .hero{margin:16px;border-radius:22px;overflow:hidden;border:1px solid var(--stroke);
  background:linear-gradient(135deg,rgba(52,231,200,.18),rgba(31,184,214,.08));padding:24px 20px}
#store .hero .ic{width:74px;height:74px;border-radius:19px;display:flex;align-items:center;justify-content:center;font-size:38px;
  background:linear-gradient(120deg,var(--accent),var(--accent2));margin-bottom:14px;box-shadow:0 10px 24px rgba(52,231,200,.3)}
#store .hero h2{margin:0;font-size:22px}
#store .hero .dev{color:var(--accent);font-size:13px;margin-top:2px;font-weight:600}
#store .hero p{color:var(--muted);font-size:13.5px;line-height:1.55;margin:13px 0 0}
#store .meta{display:flex;gap:26px;margin:18px;color:var(--muted);font-size:12px;text-align:center}
#store .meta div b{display:block;color:var(--text);font-size:16px;font-weight:800;margin-bottom:2px}
.installbtn{margin:6px 18px;width:calc(100% - 36px);padding:15px;border:none;border-radius:16px;font-family:inherit;
  font-size:15px;font-weight:800;background:linear-gradient(100deg,var(--accent),var(--accent2));color:#04241f;cursor:pointer}

/* ============ STORY OVERLAY ============ */
#story{position:absolute;inset:0;z-index:200;display:none;flex-direction:column;justify-content:flex-end;cursor:pointer;
  background:rgba(2,4,9,.86);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);padding:0 0 0;animation:fadeIn .4s}
#story.active{display:flex}
#storyArt{flex:1;display:flex;align-items:center;justify-content:center;font-size:88px;opacity:.9;
  filter:drop-shadow(0 0 40px rgba(52,231,200,.4));animation:floaty 5s ease-in-out infinite}
@keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
#storyBox{background:var(--panel-solid);border-top:1px solid var(--stroke-strong);border-radius:26px 26px 0 0;padding:26px 24px 36px;min-height:230px}
#storyChap{font-size:11px;letter-spacing:3px;color:var(--accent);font-weight:800;margin-bottom:6px}
#storyName{font-size:15px;font-weight:800;color:var(--gold);margin-bottom:8px;min-height:18px}
#storyText{font-size:16px;line-height:1.7;min-height:90px}
#storyText .cursor{display:inline-block;width:9px;height:18px;background:var(--accent);margin-left:2px;vertical-align:-2px;animation:blink .9s steps(1) infinite}
@keyframes blink{50%{opacity:0}}
#storyChoices{display:flex;flex-direction:column;gap:10px;margin-top:18px}
.storychoice{background:rgba(52,231,200,.10);border:1px solid rgba(52,231,200,.3);color:var(--text);border-radius:15px;
  padding:14px 16px;font-size:14.5px;text-align:left;cursor:pointer;font-family:inherit;transition:transform .12s,background .2s;animation:popIn .4s both}
.storychoice:active{transform:scale(.98)}
.storychoice.warn{border-color:rgba(255,77,109,.4);background:rgba(255,77,109,.08)}
#storyNext{align-self:flex-end;margin-top:16px;color:#04241f;font-weight:800;font-size:14px;cursor:pointer;
  display:flex;gap:6px;align-items:center;background:linear-gradient(100deg,var(--accent),var(--accent2));
  padding:10px 18px;border-radius:13px;animation:nextPulse 1.6s ease-in-out infinite}
@keyframes nextPulse{0%,100%{transform:scale(1);opacity:.92}50%{transform:scale(1.04);opacity:1}}

/* ============ TOAST NOTIFICATION ============ */
#toasts{position:absolute;top:50px;left:0;right:0;z-index:300;display:flex;flex-direction:column;gap:9px;padding:0 12px;pointer-events:none}
.toast{background:var(--panel);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--stroke-strong);
  border-radius:20px;padding:13px 15px;display:flex;gap:12px;align-items:flex-start;box-shadow:0 14px 34px rgba(0,0,0,.45);
  animation:toastIn .5s cubic-bezier(.2,1.2,.3,1) both;pointer-events:auto}
.toast.out{animation:toastOut .4s ease forwards}
@keyframes toastIn{from{opacity:0;transform:translateY(-34px) scale(.92)}to{opacity:1;transform:none}}
@keyframes toastOut{to{opacity:0;transform:translateY(-30px) scale(.95)}}

/* ---------- default state ---------- */

    storySeen:[],
    settings:{theme:"dark",sound:true},
    unlockedEndings:[], achievements:[],
    lastEnding:null

/* ---------- persistence ---------- */
function save(){ try{localStorage.setItem(SAVE_KEY,JSON.stringify(S));}catch(e){} }
function load(){ try{const r=localStorage.getItem(SAVE_KEY);if(r){S=Object.assign(freshState(),JSON.parse(r));return true;}}catch(e){} return false; }
function hardReset(){ const keepE=S.unlockedEndings,keepA=S.achievements,keepSet=S.settings;
  S=freshState(); S.unlockedEndings=keepE; S.achievements=keepA; S.settings=keepSet; save(); }

/* ---------- audio (web audio, toggleable) ---------- */
let AC=null;
function tone(freq=440,dur=.08,type="sine",vol=.05){
  if(!S.settings.sound) return;
  try{ AC=AC||new (window.AudioContext||window.webkitAudioContext)();
    const o=AC.createOscillator(),g=AC.createGain();
    o.type=type;o.frequency.value=freq;o.connect(g);g.connect(AC.destination);
    g.gain.setValueAtTime(vol,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(.0001,AC.currentTime+dur);
    o.start();o.stop(AC.currentTime+dur);
  }catch(e){}
}
const sfx={
  tap:()=>tone(520,.05,"triangle",.04),
  pop:()=>tone(720,.07,"sine",.05),
  sell:()=>{tone(660,.07);setTimeout(()=>tone(990,.1),70);},
  reject:()=>tone(300,.12,"sawtooth",.04),
  notif:()=>{tone(880,.08,"sine",.05);setTimeout(()=>tone(1175,.1,"sine",.05),90);},
  warn:()=>tone(160,.3,"sawtooth",.06),
  type:()=>tone(1400+Math.random()*200,.012,"square",.012),
  ending:()=>{[392,523,659,784].forEach((f,i)=>setTimeout(()=>tone(f,.5,"sine",.05),i*180));}
};

/* ---------- clock ---------- */
function tickClock(){
  const d=new Date();let h=d.getHours(),m=d.getMinutes();
  const hh=((h%12)||12);const mm=String(m).padStart(2,"0");

}

/* =========================================================
   RENDERING HELPERS
   ========================================================= */
let backStack=[];
function showScreen(id,push=true){
  // Guarantee no stale full-screen overlay is left intercepting clicks.
  $("#modal").classList.remove("active");
  $("#ending").classList.remove("active");
  if(id!=="lock"){ $("#story").classList.remove("active"); }
  $$(".screen").forEach(s=>s.classList.remove("active","slideIn"));
  const el=$("#"+id); el.classList.add("active");
  if(id!=="lock"&&id!=="home") el.classList.add("slideIn");
  if(push&&id!=="lock") backStack.push(id);
  $("#homeIndicator").style.display=(id==="lock")?"none":"block";
}
function goHome(){ sfx.tap(); backStack=["home"]; renderHome(); showScreen("home",false); }

function openApp(id){
  sfx.tap();
  if((id==="cm")&&!S.appInstalled){ renderStore(); showScreen("store"); return; }
  if(id==="cm"){ renderCM(); showScreen("cm"); }
  else if(id==="chat"){ renderChatList(); showScreen("chat"); }
  else if(id==="sns"){ renderSNS(); showScreen("sns"); }
  else if(id==="news"){ renderNews(); showScreen("news"); }
  else if(id==="prof"){ renderProfile(); showScreen("prof"); }
  else if(id==="settings"){ renderSettings(); showScreen("settings"); }
  else if(id==="store"){ renderStore(); showScreen("store"); }
}

function renderHome(){
  $("#homePts").textContent=fmt(S.points)+" C";
  $("#homeSub").textContent = S.completed.length? `${S.completed.length}건 거래 완료 · ${S.soldRights.length}건 판매` : "아직 거래가 없습니다";
  const grid=$("#appgrid"); grid.innerHTML="";
  HOME_APPS.forEach((a,i)=>{
    if(a.id==="cm"&&!S.appInstalled) return;
    const d=document.createElement("div"); d.className="app"; d.style.animationDelay=(i*40)+"ms";
    let badge="";
    if(a.id==="cm"&&availableOffers().length) badge=`<span class="badge">${availableOffers().length}</span>`;

/* typing effect */
let typingTimer=null, skipType=false;
function typeText(el,txt,cb){
  clearInterval(typingTimer); skipType=false; el.innerHTML="";
  let i=0; const cur='<span class="cursor"></span>';
  typingTimer=setInterval(()=>{
    if(skipType){ el.innerHTML=txt; clearInterval(typingTimer); cb&&cb(); return; }
    i++; el.innerHTML=txt.slice(0,i)+cur;
    if(i%2===0) sfx.type();
    if(i>=txt.length){ clearInterval(typingTimer); el.innerHTML=txt; cb&&cb(); }
  },24);
}

let storyQueue=[], storyIdx=0, storyDone=null, storyTyping=false, storyWaiting=false;
function runStory(beats,onDone){
  storyQueue=beats.slice(); storyIdx=0; storyDone=onDone;
  $("#story").classList.add("active");
  $("#homeIndicator").style.display="none";
  renderStoryBeat();
}
function renderStoryBeat(){
  const b=storyQueue[storyIdx];
  if(!b){ endStory(); return; }
  $("#storyChap").textContent=b.chap||"";
  $("#storyArt").textContent=b.art||"📱";
  $("#storyName").textContent=b.name||"";
  $("#storyName").style.color=b.warn?"var(--warn)":"var(--gold)";
  $("#storyChoices").innerHTML=""; $("#storyNext").style.display="none";
  if(b.warn) sfx.warn();
  storyTyping=true; storyWaiting=false;
  typeText($("#storyText"),b.text,()=>{
    storyTyping=false;
    if(b.choices){ renderStoryChoices(b.choices); storyWaiting=false; }
    else { $("#storyNext").style.display="flex"; storyWaiting=true; }
  });
}
function renderStoryChoices(choices){
  const box=$("#storyChoices"); box.innerHTML="";
  choices.forEach((c,i)=>{

    box.appendChild(btn);
  });
}
function nextStory(){ storyIdx++; renderStoryBeat(); }
function endStory(){ $("#story").classList.remove("active"); $("#homeIndicator").style.display="block";

function tradeOffer(o,sell){
  if(o.special==="recruit"){ handleRecruit(sell); return; }
  if(o.id==="life"){ handleFinal(sell); return; }
  S.completed.push(o.id);
  const rec={cat:o.id,weight:o.weight,action:sell?"sell":"reject",social:!!o.social,efficiency:!!o.efficiency};
  S.choiceHistory.push(rec);
  if(sell){
    sfx.sell();
    S.soldRights.push(o.id); S.points+=o.price;
    S.identityScore=Math.max(0,S.identityScore-o.weight);
    if(o.social){ S.closeness.minji-=4; S.closeness.seoyeon-=2; }
    unlock("first_sale");
    if(S.soldRights.length>=8) unlock("sellout");
    pushToast("◑","Choice Market","선택권이 판매되었습니다. +"+fmt(o.price)+"C","linear-gradient(135deg,#34e7c8,#1fb8d6)");
  } else {
    sfx.reject();
    S.rejectedRights.push(o.id);
    S.identityScore=Math.min(100,S.identityScore+Math.round(o.weight*0.5));
    unlock("first_reject");
    pushToast("✋","Choice Market","거래를 거절했습니다.","linear-gradient(135deg,#9aa3b5,#6b7280)");
  }
  save();
  checkActProgress(()=>{ renderCM(); });
}

function handleRecruit(accept){

  else { sfx.reject(); pushToast("✋","NEXUS","제안을 보류했습니다.","linear-gradient(135deg,#9aa3b5,#6b7280)"); }

}

/* =========================================================
   ACT PROGRESSION
   ========================================================= */
function actClearCount(act){ return OFFERS.filter(o=>o.act===act&&o.id!=="life").length; }
function actDoneCount(act){ return OFFERS.filter(o=>o.act===act&&o.id!=="life"&&S.completed.includes(o.id)).length; }

function checkActProgress(after){
  // advance act when current act offers (except final) are all handled
  const need=actClearCount(S.act);
  const done=actDoneCount(S.act);
  if(S.act<5 && done>=need){
    advanceAct(after);
  } else { after&&after(); }
}
function advanceAct(after){
  S.act++; save();
  // unlock chat steps & notifications per act
  let beats=null, art="📱";
  if(S.act===2) beats=STORY.act2;
  else if(S.act===3) beats=STORY.act3;
  else if(S.act===4) beats=STORY.act4;
  else if(S.act===5) beats=STORY.act5;
  if(S.act===4){
    // truth flag + achievement
    S.flags.sawTruth=true; unlock("truth");
  }
  if(beats){
    // go to home first for context, then play story
    goHome();
    setTimeout(()=>runStory(beats,()=>{
      afterActStory();
      after&&after();
    }),350);
  } else { afterActStory(); after&&after(); }
}
function afterActStory(){
  // push notifications hinting new content
  if(S.act>=2){ setTimeout(()=>pushToast("💬","메시지","도현: 야 너도 그거 깔았어? ㅋㅋ","linear-gradient(135deg,#3ddc84,#1fa463)"),600); }
  if(S.act>=3){ setTimeout(()=>pushToast("📰","News","'선택권 거래 의존성' 논란","linear-gradient(135deg,#6b7cff,#4453d6)"),1400); }
  if(S.act>=4){ setTimeout(()=>pushToast("⚠️","FLOW","내부고발자: 약관 §0을 읽어라","linear-gradient(135deg,#ff7eb3,#ff4d6d)"),1600); }
  if(S.act>=5){ setTimeout(()=>pushToast("💬","메시지","민지: 팔지 마. 같이 멈추자.","linear-gradient(135deg,#6b7cff,#4453d6)"),900); }
  renderHome();
}

/* =========================================================
   ENDING RESOLUTION
   ========================================================= */
function computeEnding(){
  const f=S.flags, id=S.identityScore, sold=S.soldRights.length;
  const minClose=Math.min(S.closeness.dohyun,S.closeness.minji,S.closeness.seoyeon);
  const avgClose=(S.closeness.dohyun+S.closeness.minji+S.closeness.seoyeon)/3;
  if(f._exile) return "exile";
  if(sold===0 && f.refusedFinal) return "hidden_truth";
  if(f.joinedSystem) return "system_admin";
  if(f.foughtSystem && f.ralliedFriends) return "revolution";
  if(f.foughtSystem) return "resistance";
  if(id<=12 && !f.sawTruth) return "unconscious"; // never reached truth & emptied out (rare)
  if(id<=18) return "full_auto";
  if(f.soldDeletion) return "conformity";
  if(id>=60 && avgClose<=22) return "isolation";
  if(id>=70 && f.refusedFinal) return "free_will";
  return "balance";
}
function finishGame(){
  const id=computeEnding(); S.lastEnding=id;
  if(!S.unlockedEndings.includes(id)) S.unlockedEndings.push(id);
  if(S.unlockedEndings.length>=3) unlock("collector3");
  if(id==="hidden_truth") unlock("purist");
  if(S.closeness.minji>=60) unlock("loyal_friend");
  save();
  showEnding(id);
}
function showEnding(id){

/* =========================================================
   CHAT ENGINE
   ========================================================= */
function currentChatStep(who){
  // which script index is unlocked by act
  let max;
  if(S.act<=2) max=0; else if(S.act===3) max=1; else max=2;
  const step=S.chatStep[who];
  return step<=max ? step : null; // if completed all up to act → null means done
}
function chatDone(who){
  let max; if(S.act<=2) max=0; else if(S.act===3) max=1; else max=2;
  return S.chatStep[who]>max;
}
function renderChatList(){
  const list=$("#chatList"); list.innerHTML="";
  Object.keys(CHATS).forEach(who=>{
    const c=CHATS[who];
    const log=S.chatLog[who];
    const prev= log.length? (log[log.length-1].me?("나: "+log[log.length-1].text):log[log.length-1].text) : "(새 대화)";
    const hasNew=currentChatStep(who)!==null && !chatDone(who);
    const row=document.createElement("div"); row.className="row";
    row.innerHTML=`<div class="av" style="background:${c.bg}">${c.av}</div>
      <div class="meta"><div class="nm">${c.name}${hasNew?' <span style="color:var(--warn)">●</span>':''}<small>방금</small></div>
      <div class="pv">${prev}</div></div>`;
    row.onclick=()=>openChat(who);
    list.appendChild(row);
  });
}
let activeChat=null;
function openChat(who){
  sfx.tap(); activeChat=who; const c=CHATS[who];
  $("#ctAv").textContent=c.av; $("#ctAv").style.background=c.bg; $("#ctName").textContent=c.name;
  showScreen("chatThread");
  renderChatThread();
}
function renderChatThread(){
  const who=activeChat, c=CHATS[who];
  const body=$("#chatThreadBody"); body.style.cssText="flex:1;overflow-y:auto;padding:16px 14px 10px;display:flex;flex-direction:column;gap:9px";
  body.innerHTML="";
  // render history
  S.chatLog[who].forEach(m=>addBubble(body,m));
  // play current step if not started
  const step=currentChatStep(who);
  $("#chatReplies").innerHTML="";
  if(step===null){ body.insertAdjacentHTML("beforeend",'<div class="bubble sys">대화가 끝났습니다.</div>'); body.scrollTop=body.scrollHeight; return; }
  playChatScript(who,step);
}
function addBubble(body,m){
  const d=document.createElement("div");
  if(m.sys){ d.className="bubble sys"; d.textContent=m.text; }
  else if(m.me){ d.className="bubble me"; d.textContent=m.text; }
  else { d.className="bubble them"; d.textContent=m.text; }
  body.appendChild(d);
}
let chatBeats=[], chatBeatIdx=0;
function playChatScript(who,step){
  const script=CHATS[who].scripts[step];
  chatBeats=script; chatBeatIdx=S.chatProg[who]||0;
  advanceChatBeat(who);
}
function advanceChatBeat(who){
  const body=$("#chatThreadBody"); const replies=$("#chatReplies"); replies.innerHTML="";
  if(chatBeatIdx>=chatBeats.length){
    S.chatProg[who]=0;
    S.chatStep[who]++;
    save();
    body.insertAdjacentHTML("beforeend",'<div class="bubble sys">대화가 끝났습니다.</div>');
    body.scrollTop=body.scrollHeight; return;
  }
  const beat=chatBeats[chatBeatIdx];
  if(beat.them!==undefined || beat.sys!==undefined){
    const typ=document.createElement("div"); typ.className="typing"; typ.innerHTML="<i></i><i></i><i></i>";
    if(beat.sys===undefined) body.appendChild(typ);
    body.scrollTop=body.scrollHeight;
    setTimeout(()=>{
      typ.remove();
      const m = beat.sys!==undefined? {sys:true,text:beat.sys} : {text:beat.them};
      addBubble(body,m); S.chatLog[who].push(m); body.scrollTop=body.scrollHeight;
      if(!beat.sys) sfx.pop();
      chatBeatIdx++; S.chatProg[who]=chatBeatIdx; save();
      advanceChatBeat(who);
    }, beat.sys!==undefined?500:760);
  } else if(beat.me){
    beat.me.forEach((opt,i)=>{
      const b=document.createElement("button"); b.className="reply"; b.textContent=opt.t;
      b.onclick=()=>{ sfx.tap();
        const m={me:true,text:opt.t}; addBubble(body,m); S.chatLog[who].push(m); body.scrollTop=body.scrollHeight;
        if(opt.close) for(const k in opt.close) S.closeness[k]=Math.max(0,Math.min(100,S.closeness[k]+opt.close[k]));
        if(opt.flag) S.flags[opt.flag]=true;
        replies.innerHTML=""; chatBeatIdx++; S.chatProg[who]=chatBeatIdx; save();
        advanceChatBeat(who);
      };
      replies.appendChild(b);
    });
  }
}

  const eff=S.choiceHistory.filter(h=>h.action==="sell"&&h.efficiency).length;
  const socSold=S.choiceHistory.filter(h=>h.action==="sell"&&h.social).length;
  const socTotal=S.choiceHistory.filter(h=>h.social).length||1;
  const effPct=Math.round((socSold/socTotal)*100);
  const sellRate=Math.round((S.soldRights.length/(S.completed.filter(c=>c!=="recruit").length||1))*100);
  // AI knows you (only meaningful from act 4)
  let quotes="";
  if(S.act>=4){
    quotes=`
    <div class="aiquote"><b>분석:</b> 당신은 <b>${effPct}%</b> 확률로 친구보다 효율을 선택합니다.</div>
    <div class="aiquote"><b>예측:</b> 다음 거래에서 당신이 '판매'를 누를 확률 <b>${sellRate}%</b>. 우리는 이미 알고 있습니다.</div>
    <div class="aiquote"><b>학습 완료:</b> 총 ${sold}개의 선택권으로 당신의 ${Math.min(99,Math.round(sold*8))}% 를 재현했습니다.</div>`;
  } else {
    quotes=`<div class="aiquote" style="border-color:var(--stroke);background:rgba(255,255,255,.04);color:var(--muted)">데이터를 더 수집하는 중입니다…</div>`;
  }
  body.innerHTML=`
    <div class="card"><div class="pav">◍</div><h2>${S.flags.sawTruth?'???':'나'}</h2><div class="pid mono">USER-${(S.choiceHistory.length*7+42)}</div></div>
    <div class="statbar"><div class="l"><span>AI 학습 진행도</span><span>${Math.min(100,Math.round(sold*9))}%</span></div><div class="track"><div class="fill" style="width:${Math.min(100,sold*9)}%"></div></div></div>
    ${quotes}
    <div class="empty" style="padding:18px 22px">${S.act>=4?'프로필 사진과 이름은 자동 설정되었습니다.':'활동을 계속하면 더 정확한 프로필이 만들어집니다.'}</div>`;
}
function renderSettings(){
  const body=$("#setBody");
  const deletable = S.appInstalled;
  body.innerHTML=`
    <div class="setgrp">
      <div class="setrow" id="tgTheme"><div class="ic" style="background:rgba(255,207,92,.2)">🌗</div><div class="sp">다크 모드</div><div class="toggle ${S.settings.theme==='dark'?'on':''}"><i></i></div></div>
      <div class="setrow" id="tgSound"><div class="ic" style="background:rgba(52,231,200,.2)">🔊</div><div class="sp">사운드</div><div class="toggle ${S.settings.sound?'on':''}"><i></i></div></div>
    </div>
    <div class="setgrp">
      <div class="setrow" id="goGallery"><div class="ic" style="background:rgba(52,231,200,.2)">🗂️</div><div class="sp">엔딩 갤러리</div><div class="val">${S.unlockedEndings.length}/${Object.keys(ENDINGS).length} ›</div></div>
      <div class="setrow" id="goAchv"><div class="ic" style="background:rgba(255,207,92,.2)">🏆</div><div class="sp">업적</div><div class="val">${S.achievements.length}/${Object.keys(ACHV).length} ›</div></div>
    </div>
    <div class="setgrp">
      <div class="setrow" id="delApp" style="${deletable?'':'opacity:.4'}"><div class="ic" style="background:rgba(255,77,109,.2)">🗑️</div><div class="sp" style="color:var(--warn)">Choice Market 삭제</div><div class="val">${S.flags.triedDelete?'🔒':'›'}</div></div>
      <div class="setrow" id="resetGame"><div class="ic" style="background:rgba(255,255,255,.08)">↺</div><div class="sp">처음부터 다시</div><div class="val">›</div></div>
    </div>
    <div class="empty" style="padding:18px">CHOICE MARKET · 인터랙티브 스토리<br>당신의 선택이 곧 당신입니다.</div>`;
  $("#tgTheme").onclick=()=>{ sfx.tap(); S.settings.theme=S.settings.theme==="dark"?"light":"dark"; applyTheme(); save(); renderSettings(); };
  $("#tgSound").onclick=()=>{ S.settings.sound=!S.settings.sound; sfx.tap(); save(); renderSettings(); };
  $("#goGallery").onclick=()=>{ sfx.tap(); renderGallery(); showScreen("gallery"); };
  $("#goAchv").onclick=()=>{ sfx.tap(); renderAchv(); showScreen("achv"); };
  $("#delApp").onclick=()=>{ if(!deletable)return; sfx.tap(); attemptDelete(); };
  $("#resetGame").onclick=()=>{ sfx.tap(); openModal("↺","처음부터 다시?","현재 진행은 사라집니다. (해금한 엔딩·업적은 유지됩니다.)",[
    {t:"취소",cls:"reject",fn:closeModal},{t:"다시 시작",cls:"danger",fn:()=>{closeModal();hardReset();bootNewGame();}}]); };
}
function renderGallery(){
  const g=$("#galleryGrid"); g.innerHTML="";
  ENDING_ORDER.forEach(id=>{
    const e=ENDINGS[id]; const got=S.unlockedEndings.includes(id);
    const d=document.createElement("div"); d.className="gcard"+(got?"":" locked");
    d.innerHTML=`<div class="ge">${got?e.e:'❔'}</div><div class="gt">${got?e.t:'???'}</div><div class="gd">${got?e.d.slice(0,46)+'…':'아직 해금되지 않은 엔딩'}</div>`;
    if(got) d.onclick=()=>{ sfx.tap(); openModal(e.e,e.t,e.d,[{t:"닫기",cls:"sell",fn:closeModal}]); };
    g.appendChild(d);
  });
}
function renderAchv(){
  const b=$("#achvBody"); b.innerHTML="";
  Object.keys(ACHV).forEach(id=>{
    const a=ACHV[id]; const got=S.achievements.includes(id);
    const d=document.createElement("div"); d.className="achv"+(got?"":" locked");
    d.innerHTML=`<div class="ae">${got?a.e:'🔒'}</div><div><div class="at">${got?a.t:'???'}</div><div class="ad">${a.d}</div></div>`;
    b.appendChild(d);
  });
}

/* =========================================================
   TOASTS & MODAL
   ========================================================= */
function pushToast(icon,title,body,bg){
  sfx.notif();
  const t=document.createElement("div"); t.className="toast";
  t.innerHTML=`<div class="ic" style="background:${bg||'var(--accent)'}">${icon}</div>
    <div style="flex:1"><div class="t">${title}<small>지금</small></div><div class="b">${body}</div></div>`;
  $("#toasts").appendChild(t);
  setTimeout(()=>{ t.classList.add("out"); setTimeout(()=>t.remove(),400); },4200);
  t.onclick=()=>{ t.classList.add("out"); setTimeout(()=>t.remove(),400); };
}
function pushOfferToast(o){ pushToast("◑","Choice Market","새 거래: "+o.title,"linear-gradient(135deg,#34e7c8,#1fb8d6)"); }

function openModal(icon,title,text,btns){
  const c=$("#modalCard");
  c.innerHTML=`<div class="mic">${icon}</div><h3>${title}</h3><p>${text}</p>
    <div class="mbtns">${btns.map((b,i)=>`<button class="btn ${b.cls}" data-i="${i}">${b.t}</button>`).join('')}</div>`;
  $$("#modalCard .btn").forEach((el,i)=>el.onclick=()=>{sfx.tap();btns[i].fn();});
  $("#modal").classList.add("active");
}
function closeModal(){ $("#modal").classList.remove("active"); }

/* =========================================================
   ACHIEVEMENTS / THEME
   ========================================================= */
function unlock(id){
  if(S.achievements.includes(id)) return;
  S.achievements.push(id); save();
  const a=ACHV[id]; if(a) pushToast(a.e,"업적 달성",a.t,"linear-gradient(135deg,#ffcf5c,#ff9a3c)");
}
function applyTheme(){ document.documentElement.setAttribute("data-theme",S.settings.theme==="light"?"light":"dark"); }

/* =========================================================
   NAVIGATION WIRING (back / home)
   ========================================================= */
document.addEventListener("click",(e)=>{
  const open=e.target.closest("[data-open]");
  if(open){ openApp(open.getAttribute("data-open")); return; }
  const back=e.target.closest("[data-back]");
  if(back){ sfx.tap(); const to=back.getAttribute("data-back");
    if(to==="chat"){ renderChatList(); showScreen("chat",false);}
    else if(to==="settings"){ renderSettings(); showScreen("settings",false);}
    else { showScreen(to,false);} return; }
  const home=e.target.closest("[data-home]");
  if(home){ goHome(); return; }
});

/* lock screen unlock: tap or swipe up */
function wireLock(){
  const lock=$("#lock");
  let startY=null;
  const unlock=()=>{ if(!lock.classList.contains("active"))return; sfx.tap();
    backStack=["home"]; renderHome(); showScreen("home",false);
    // if not started, run intro
    if(!S.started){ S.started=true; save();
      setTimeout(()=>runStory(STORY.intro,()=>{ goHome(); }),300);
    }
  };
  // pointer / click / touch all trigger unlock (covers mouse, trackpad, touch)
  lock.addEventListener("click",unlock);
  lock.addEventListener("pointerdown",unlock);
  lock.addEventListener("touchstart",e=>startY=e.touches[0].clientY,{passive:true});
  lock.addEventListener("touchend",e=>{ if(startY!==null){ const dy=startY-e.changedTouches[0].clientY; if(dy>40) unlock(); startY=null; }});
  // global fallback: any click or keypress while locked unlocks (in case an
  // overlay or sandbox quirk swallows the direct lock-screen event)
  document.addEventListener("click",()=>{ if(lock.classList.contains("active")) unlock(); });
  document.addEventListener("keydown",()=>{ if(lock.classList.contains("active")) unlock(); });
}

/* =========================================================
   LOCK SCREEN NOTIFS
   ========================================================= */
function renderLockNotifs(){
  const box=$("#lockNotifs"); box.innerHTML="";
  const notifs=[
    {ic:"📲",bg:"linear-gradient(135deg,#34e7c8,#1fb8d6)",t:"알 수 없음",sub:"지금",b:"결정하느라 지치셨나요? 이제 선택하지 않아도 됩니다."},
    {ic:"💬",bg:"linear-gradient(135deg,#3ddc84,#1fa463)",t:"민지",sub:"5분 전",b:"그 앱 깔지 마. 후기 좀 이상해."},
  ];
  notifs.forEach((n,i)=>{
    const d=document.createElement("div"); d.className="locknotif"; d.style.animationDelay=(i*120+200)+"ms";
    d.innerHTML=`<div class="ic" style="background:${n.bg}">${n.ic}</div><div style="flex:1"><div class="t">${n.t}<small>${n.sub}</small></div><div class="b">${n.b}</div></div>`;
    box.appendChild(d);
  });
}

/* =========================================================
   BOOT
   ========================================================= */
function bootNewGame(){
  S.started=false; applyTheme(); renderLockNotifs(); backStack=[]; showScreen("lock",false);
}
function boot(){
  const had=load(); applyTheme(); tickClock(); setInterval(tickClock,15000);
  renderLockNotifs();
  wireLock();
  if(had && S.started){
    // resume to home
    backStack=["home"]; renderHome(); showScreen("home",false);
    setTimeout(()=>pushToast("◑","Choice Market","돌아오신 것을 환영합니다.","linear-gradient(135deg,#34e7c8,#1fb8d6)"),700);
  } else {
    showScreen("lock",false);
  }
}
boot();

</script>
